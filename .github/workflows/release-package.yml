name: Build Plugin Release Package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to package. Defaults to the latest checked out ref.
        required: false
        type: string

permissions:
  contents: write

jobs:
  package-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve packaging ref
        id: ref
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            echo "ref=${GITHUB_EVENT_RELEASE_TAG_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.ref }}" ]]; then
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}

      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - name: Validate release metadata
        id: meta
        shell: bash
        run: |
          plugin_header_version="$(php -r "preg_match('/^[[:space:]]*\\*[[:space:]]Version:\\s*([0-9A-Za-z._-]+)/m', file_get_contents('must-hotel-booking.php'), \$m); echo \$m[1] ?? '';")"
          plugin_constant_version="$(php -r "preg_match(\"/define\\('MUST_HOTEL_BOOKING_VERSION',\\s*'([^']+)'\\)/\", file_get_contents('must-hotel-booking.php'), \$m); echo \$m[1] ?? '';")"
          readme_stable_tag="$(php -r "preg_match('/^Stable tag:\\s*([0-9A-Za-z._-]+)/mi', file_get_contents('readme.txt'), \$m); echo \$m[1] ?? '';")"

          if [[ -z "$plugin_header_version" || -z "$plugin_constant_version" || -z "$readme_stable_tag" ]]; then
            echo "Unable to read version metadata from plugin files."
            exit 1
          fi

          if [[ "$plugin_header_version" != "$plugin_constant_version" ]]; then
            echo "Plugin header version ($plugin_header_version) does not match MUST_HOTEL_BOOKING_VERSION ($plugin_constant_version)."
            exit 1
          fi

          if [[ "$plugin_header_version" != "$readme_stable_tag" ]]; then
            echo "Plugin version ($plugin_header_version) does not match readme stable tag ($readme_stable_tag)."
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            tag="${GITHUB_EVENT_RELEASE_TAG_NAME}"
          elif [[ "${REF_NAME}" =~ ^refs/tags/ ]]; then
            tag="${REF_NAME#refs/tags/}"
          else
            tag=""
          fi

          if [[ -n "$tag" && "${tag#v}" != "$plugin_header_version" ]]; then
            echo "Release tag ($tag) does not match plugin version ($plugin_header_version)."
            exit 1
          fi

          version="$plugin_header_version"

          asset="must-hotel-booking-${version}.zip"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          REF_NAME: ${{ github.ref }}

      - name: Build plugin ZIP
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist/must-hotel-booking

          rsync -a ./ dist/must-hotel-booking/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '_puc_tmp/' \
            --exclude 'dist/' \
            --exclude 'node_modules/' \
            --exclude 'vendor/bin/' \
            --exclude 'tests/' \
            --exclude 'test/' \
            --exclude 'Test/' \
            --exclude 'docs/' \
            --exclude 'screenshots/' \
            --exclude 'screenshot-*.png' \
            --exclude 'screenshot-*.jpg' \
            --exclude '.idea/' \
            --exclude '.vscode/' \
            --exclude '.editorconfig' \
            --exclude '.gitignore' \
            --exclude '.gitattributes' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude '*.log' \
            --exclude '.DS_Store' \
            --exclude 'Thumbs.db' \
            --exclude 'README.md' \
            --exclude 'composer.json' \
            --exclude 'composer.lock' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'phpunit.xml' \
            --exclude 'phpunit.xml.dist' \
            --exclude '*.zip'

          (
            cd dist
            zip -r "../${{ steps.meta.outputs.asset }}" must-hotel-booking
          )

      - name: Validate ZIP structure
        shell: bash
        run: |
          entries="$(unzip -Z1 "${{ steps.meta.outputs.asset }}")"

          echo "$entries" | grep -q '^must-hotel-booking/must-hotel-booking.php$'
          echo "$entries" | grep -q '^must-hotel-booking/lib/plugin-update-checker/plugin-update-checker.php$'

          if echo "$entries" | grep -q '^must-hotel-booking/must-hotel-booking/'; then
            echo "Double nested plugin directory detected in ZIP."
            exit 1
          fi

          if echo "$entries" | grep -qv '^must-hotel-booking/'; then
            echo "ZIP contains entries outside the must-hotel-booking/ root."
            exit 1
          fi

          for forbidden in \
            '^must-hotel-booking/\.git/' \
            '^must-hotel-booking/\.github/' \
            '^must-hotel-booking/node_modules/' \
            '^must-hotel-booking/vendor/bin/' \
            '^must-hotel-booking/tests/' \
            '^must-hotel-booking/test/' \
            '^must-hotel-booking/Test/' \
            '^must-hotel-booking/screenshots/' \
            '^must-hotel-booking/\.idea/' \
            '^must-hotel-booking/\.vscode/' \
            '^must-hotel-booking/README\.md$'
          do
            if echo "$entries" | grep -q "$forbidden"; then
              echo "ZIP contains excluded content matching ${forbidden}."
              exit 1
            fi
          done

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.asset }}
          path: ${{ steps.meta.outputs.asset }}

      - name: Attach ZIP to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ${{ steps.meta.outputs.asset }}
          overwrite_files: true
